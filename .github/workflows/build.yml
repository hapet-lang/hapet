name: Build All Platforms

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:

      build_win_x86:
        description: 'Build Windows x86'
        required: false
        type: boolean
        default: true
      build_win_x64:
        description: 'Build Windows x64'
        required: false
        type: boolean
        default: true
      build_win_arm64:
        description: 'Build Windows ARM64'
        required: false
        type: boolean
        default: true
      build_linux_x64:
        description: 'Build Linux x64'
        required: false
        type: boolean
        default: true
      build_linux_arm64:
        description: 'Build Linux ARM64'
        required: false
        type: boolean
        default: true
      build_osx_x64:
        description: 'Build macOS Intel (x64)'
        required: false
        type: boolean
        default: true
      build_osx_arm64:
        description: 'Build macOS Silicon (ARM64)'
        required: false
        type: boolean
        default: true

jobs:
  win-x64:
    if: ${{ github.event.inputs.build_win_x64 == 'true' }}
    uses: ./.github/workflows/build-win-x64.yml
    secrets: inherit
  win-x86:
    if: ${{ github.event.inputs.build_win_x86 == 'true' }}
    uses: ./.github/workflows/build-win-x86.yml
    secrets: inherit
  create-release:
    needs: [win-x64, win-x86]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Read version from version.txt
        id: version
        run: |
          version=$(cat ./build-resources/version.txt | tr -d '\n\r')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version read from version.txt: $version"
      
      - name: Download win-x64 artifacts
        if: ${{ github.event.inputs.build_win_x64 == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: built-files-win-x64
          path: ./built-files-win-x64/
      
      - name: Prepare release files
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p ./release_files
          
          echo "Using version: $version"
          
          # win-x64
          if [ -d "./built-files-win-x64" ]; then
            cp ./built-files-win-x64/hapet_x64.exe ./release_files/hapet_x64.exe
          fi
          
          echo "Final release files:"
          ls -la ./release_files/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: ./release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
