name: Build Windows x64

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install NSIS and EnVar Plugin
        shell: pwsh
        run: |
          choco feature disable -n=showDownloadProgress
          choco install nsis -y
          
          $envarUrl = "https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip"
          $zipPath = "$env:TEMP\EnVar-Plugin.zip"
          Invoke-WebRequest -Uri $envarUrl -OutFile $zipPath

          $tempExtract = "$env:TEMP\envar_extracted"
          Expand-Archive -Path $zipPath -DestinationPath $tempExtract -Force

          $nsisDir = "C:\Program Files (x86)\NSIS"
          Copy-Item -Path "$tempExtract\Plugins\x86-unicode\*.dll" -Destination "$nsisDir\Plugins\x86-unicode\" -Force
          Copy-Item -Path "$tempExtract\Plugins\x86-ansi\*.dll" -Destination "$nsisDir\Plugins\x86-ansi\" -Force

          if (Test-Path "$nsisDir\Plugins\x86-unicode\EnVar.dll") {
              Write-Host "EnVar.dll successfully installed to NSIS plugins."
          } else {
              throw "EnVar.dll not found after extraction!"
          }
          
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "C:\Program Files (x86)\NSIS\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Download lld-link
        shell: pwsh
        run: |
          $linkerUrl = "https://github.com/CrackAndDie/lld-linkers/releases/download/win-x64/lld-link.exe"
          $linkerPath = "lld-link.exe"
          Invoke-WebRequest -Uri $linkerUrl -OutFile $linkerPath
      - name: Download VC++ Redistributable (x64)
        shell: pwsh
        run: |
          $redistUrl = "https://aka.ms/vc14/vc_redist.x64.exe"
          $redistPath = "build-win/vc_redist.x64.exe"
          Invoke-WebRequest -Uri $redistUrl -OutFile $redistPath
      - name: Download and start xwin
        shell: pwsh
        run: |
          $xwinUrl = "https://github.com/Jake-Shadle/xwin/releases/download/0.8.0/xwin-0.8.0-x86_64-pc-windows-msvc.tar.gz"
          $xwinPath = "xwin.tar.gz"
          Invoke-WebRequest -Uri $xwinUrl -OutFile $xwinPath
          $xwinDir = "xwin-tool"
          New-Item -ItemType Directory -Force -Path $xwinDir | Out-Null
          tar -xzf $xwinPath -C $xwinDir --strip-components=1
          Remove-Item $xwinPath -Force
          ls $xwinDir

          $xwinCache = "xwin-cache"
          $xwinSplat = "$xwinCache/splat"
          $xwinExe = "$xwinDir/xwin.exe"
          $env:XWIN_ACCEPT_LICENSE = "1"
          & $xwinExe splat --output "$xwinCache"
          if ($LASTEXITCODE -ne 0) { throw "xwin splat failed" }
      - name: Build project and hash computer
        shell: pwsh
        run: | 
          cd build-win
          ./build-x64.ps1
          ls -Force
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-files-win-x64
          path: ./build-win/
